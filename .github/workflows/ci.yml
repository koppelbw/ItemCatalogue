name: CI

# Build the solution and run the full test suite on every push and pull request.
# Runs on Linux (ubuntu-latest) so it stays inside the free GitHub Actions minutes
# (Windows runners bill at 2x). Docker is preinstalled on the runner, which the
# Persistence/API integration tests need for their SQL Server Testcontainers.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: # allow manual runs from the Actions tab

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Cache NuGet packages keyed on the project files so unchanged dependencies
      # restore from cache instead of re-downloading on every run.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.sqlproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore ItemCatalogue.slnx

      # Building the whole solution in Release also builds Database.sqlproj, producing
      # Database/bin/Release/Database.dacpac. The integration-test fixtures publish that
      # dacpac into their SQL Server container, so it must exist before the tests run.
      - name: Build
        run: dotnet build ItemCatalogue.slnx --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test ItemCatalogue.slnx
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults

      - name: Upload test results
        if: ${{ !cancelled() }} # publish results even when tests fail
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**/*.trx
          if-no-files-found: ignore
